name: "❓ Question / 提问"
description: |
  Ask a question about usage or configuration.
  询问使用或配置相关问题。
labels:
  - question
body:
  - type: checkboxes
    attributes:
      label: Self Checks / 自检
      options:
        - label: |
            I have read the [Chinese manual / FAQ entry](https://github.com/CreatorEdition/bianma-app/blob/main/docs/user-manual/zh/README.md).
            我已阅读[中文手册 / FAQ 入口](https://github.com/CreatorEdition/bianma-app/blob/main/docs/user-manual/zh/README.md)。
          required: true
        - label: |
            I have searched for [existing issues](https://github.com/CreatorEdition/bianma-app/issues), including closed ones.
            我已搜索过[已有的 Issue](https://github.com/CreatorEdition/bianma-app/issues)，包括已关闭的。
          required: true

  - type: dropdown
    attributes:
      label: Related App / 涉及应用
      description: |
        Which app is your question about?
        你的问题涉及哪个应用？
      multiple: true
      options:
        - Claude Code
        - Codex
        - Gemini CLI
        - OpenCode
        - OpenClaw
        - General / 通用
    validations:
      required: true

  - type: textarea
    attributes:
      label: Your Question / 你的问题
      description: |
        Describe your question clearly.
        请清晰地描述你的问题。
    validations:
      required: true

  - type: textarea
    attributes:
      label: What Have You Tried / 你已经尝试过什么
      description: |
        Describe what you've already tried or researched.
        描述你已经尝试过或查阅过的内容。
    validations:
      required: false

  - type: textarea
    attributes:
      label: Environment / 环境信息
      description: |
        OS, bianma-app version, and any relevant details.
        操作系统、bianma-app 版本及其他相关信息。
      placeholder: "e.g. macOS 15.4, bianma-app 3.11.1"
    validations:
      required: false
